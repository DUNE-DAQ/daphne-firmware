name: Formal

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  default-formal:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - default
          - cover-fast
          - composable

    steps:
      - uses: actions/checkout@v5

      - uses: YosysHQ/setup-oss-cad-suite@v4
        with:
          version: '2026-04-08'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run formal suite
        run: ./scripts/formal/run_formal.sh --suite "${{ matrix.suite }}"

      - name: Upload cover traces
        if: always() && matrix.suite == 'cover-fast'
        uses: actions/upload-artifact@v4
        with:
          name: formal-cover-traces-${{ matrix.suite }}
          path: |
            formal/sby/fe_axi_axi_lite_cover/engine_0/trace*.vcd
            formal/sby/thresholds_axi_lite_cover/engine_0/trace*.vcd
          if-no-files-found: warn
          retention-days: 14
